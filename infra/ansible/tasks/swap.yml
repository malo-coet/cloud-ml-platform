---
# DigitalOcean droplets ship without swap; a small swapfile prevents the OOM
# killer from firing when every service starts at once on a 4 GB host.

- name: Check whether the swapfile already exists
  ansible.builtin.stat:
    path: /swapfile
  register: swapfile

- name: Allocate the swapfile
  ansible.builtin.command: "fallocate -l {{ swap_size_mb }}M /swapfile"
  when: not swapfile.stat.exists
  changed_when: true

- name: Restrict swapfile permissions
  ansible.builtin.file:
    path: /swapfile
    owner: root
    group: root
    mode: "0600"

- name: Format the swapfile
  ansible.builtin.command: mkswap /swapfile
  when: not swapfile.stat.exists
  changed_when: true

- name: Enable the swapfile at boot
  ansible.posix.mount:
    name: none
    src: /swapfile
    fstype: swap
    opts: sw
    state: present

- name: Activate swap now
  ansible.builtin.command: swapon /swapfile
  when: not swapfile.stat.exists
  changed_when: true

- name: Prefer RAM over swap
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "10"
    state: present
    reload: true
