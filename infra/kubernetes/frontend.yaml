apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: mlops
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Static build served by nginx; /api is routed to the backend by the
          # Ingress, so the SPA's relative API calls work unchanged.
          image: ghcr.io/malo-coet/cloud-ml-platform/frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 32Mi
              cpu: 20m
            limits:
              memory: 128Mi
