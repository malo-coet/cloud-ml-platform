# Copy to secrets.yaml, replace every value, then apply it.
# secrets.yaml is gitignored — never commit real credentials.
#
#   openssl rand -hex 32     # generate a strong value
#
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: mlops
type: Opaque
stringData:
  POSTGRES_PASSWORD: replace-with-a-strong-password
  JWT_SECRET_KEY: replace-with-openssl-rand-hex-32
  MINIO_ROOT_USER: mlops-admin
  MINIO_ROOT_PASSWORD: replace-with-a-strong-password
