apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlops
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      initContainers:
        # Idempotent: creates the buckets on first boot, no-op afterwards
        - name: create-buckets
          image: minio/mc:latest
          command:
            - sh
            - -c
            - |
              until mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "waiting for minio"; sleep 3;
              done
              mc mb --ignore-existing local/datasets local/mlflow-artifacts
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MINIO_ROOT_PASSWORD
      containers:
        - name: mlflow
          image: ghcr.io/malo-coet/cloud-ml-platform/mlflow:latest
          command:
            - sh
            - -c
            - >-
              mlflow server
              --backend-store-uri postgresql://mlops:$(POSTGRES_PASSWORD)@postgres:5432/mlflow
              --artifacts-destination s3://mlflow-artifacts
              --serve-artifacts
              --host 0.0.0.0
              --port 5000
          ports:
            - containerPort: 5000
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: POSTGRES_PASSWORD
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://minio:9000
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MINIO_ROOT_PASSWORD
            # MLflow 3 rejects unknown Host headers unless they are listed here
            - name: MLFLOW_SERVER_ALLOWED_HOSTS
              value: mlflow:5000,mlflow.mlops.mcoet.com,localhost:*,127.0.0.1:*
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: 384Mi
              cpu: 100m
            limits:
              memory: 1Gi
