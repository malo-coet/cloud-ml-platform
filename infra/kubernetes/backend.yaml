apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: mlops
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        # Database migrations run to completion before the API starts serving
        - name: migrate
          image: ghcr.io/malo-coet/cloud-ml-platform/backend:latest
          command: ["alembic", "upgrade", "head"]
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql+psycopg://mlops:$(POSTGRES_PASSWORD)@postgres:5432/mlplatform
      containers:
        - name: backend
          image: ghcr.io/malo-coet/cloud-ml-platform/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql+psycopg://mlops:$(POSTGRES_PASSWORD)@postgres:5432/mlplatform
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: JWT_SECRET_KEY
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:5000
            - name: S3_ENDPOINT_URL
              value: http://minio:9000
            # Presigned URLs are opened by the browser, so they must be signed
            # for the public S3 hostname rather than the in-cluster one.
            - name: S3_PUBLIC_ENDPOINT_URL
              value: https://s3.mlops.mcoet.com
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: ENVIRONMENT
              value: production
            - name: CORS_ORIGINS
              value: '["https://mlops.mcoet.com"]'
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 768Mi
